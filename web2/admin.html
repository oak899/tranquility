<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Admin | Tranquility Hydrotherapy</title>
		<meta name="robots" content="noindex, nofollow" />
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="style.css" />
		<style>
			body {
				font-family: 'Inter', system-ui, sans-serif;
			}
			h1,
			h2 {
				font-family: 'Playfair Display', Georgia, serif;
			}
			.consult-card {
				transition: box-shadow 0.2s ease;
			}
			.consult-card:hover {
				box-shadow: 0 8px 30px rgba(28, 25, 23, 0.08);
			}
			.chip {
				display: inline-block;
				padding: 0.2rem 0.55rem;
				margin: 0.15rem 0.25rem 0.15rem 0;
				border-radius: 9999px;
				background: #f5f5f4;
				color: #44403c;
				font-size: 0.75rem;
				line-height: 1.25rem;
			}
			.kind-facial {
				background: #fef3c7;
				color: #92400e;
			}
			.kind-head_spa {
				background: #e7e5e4;
				color: #1c1917;
			}
			.filter-btn.active {
				background: #1c1917;
				color: #fff;
				border-color: #1c1917;
			}
		</style>
	</head>
	<body class="bg-stone-50 text-stone-900 min-h-screen antialiased">
		<header class="border-b border-stone-200 bg-white/80 backdrop-blur-md">
			<div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
				<div>
					<p class="text-xs tracking-[0.2em] uppercase text-stone-500">Tranquility</p>
					<h1 class="text-2xl font-serif text-stone-900">Admin</h1>
				</div>
				<div class="flex items-center gap-4 text-sm">
					<a href="tech.html" class="text-stone-600 hover:text-stone-900 font-medium">Technician view</a>
					<a href="index.html" class="text-stone-500 hover:text-stone-800">← Site</a>
				</div>
			</div>
		</header>

		<main class="max-w-6xl mx-auto px-6 py-10">
			<section id="loginView" class="max-w-md mx-auto">
				<div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-8">
					<h2 class="text-xl font-serif mb-2">Sign in</h2>
					<p class="text-sm text-stone-500 mb-6">View appointments and consultation forms from the app.</p>
					<form id="loginForm" class="space-y-4">
						<div>
							<label for="username" class="block text-sm font-medium text-stone-700 mb-1">Username</label>
							<input
								id="username"
								name="username"
								type="text"
								autocomplete="username"
								required
								class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400" />
						</div>
						<div>
							<label for="password" class="block text-sm font-medium text-stone-700 mb-1">Password</label>
							<input
								id="password"
								name="password"
								type="password"
								autocomplete="current-password"
								required
								class="w-full rounded-xl border border-stone-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400" />
						</div>
						<p id="loginError" class="hidden text-sm text-red-600"></p>
						<button
							type="submit"
							class="w-full bg-stone-900 text-white rounded-full py-3 text-sm font-medium hover:bg-stone-700 transition-colors">
							Sign in
						</button>
					</form>
				</div>
			</section>

			<section id="dashboardView" class="hidden">
				<div class="flex flex-wrap items-center justify-between gap-4 mb-6">
					<div>
						<h2 class="text-xl font-serif">Submissions</h2>
						<p class="text-sm text-stone-500">Appointments and consultation forms</p>
					</div>
					<div class="flex gap-3">
						<button
							id="refreshBtn"
							type="button"
							class="px-5 py-2.5 rounded-full border border-stone-300 text-sm hover:bg-stone-100 transition-colors">
							Refresh
						</button>
						<button
							id="logoutBtn"
							type="button"
							class="px-5 py-2.5 rounded-full bg-stone-900 text-white text-sm hover:bg-stone-700 transition-colors">
							Log out
						</button>
					</div>
				</div>

				<p id="loadError" class="hidden mb-4 text-sm text-red-600"></p>

				<div class="border-b border-stone-200 mb-6 flex gap-6">
					<button
						id="tabAppointments"
						type="button"
						class="pb-3 text-sm font-medium border-b-2 border-stone-900 text-stone-900">
						Appointments
					</button>
					<button
						id="tabConsultations"
						type="button"
						class="pb-3 text-sm font-medium border-b-2 border-transparent text-stone-500 hover:text-stone-800">
						Consultations
					</button>
				</div>

				<div id="panelAppointments" class="bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden">
					<div class="overflow-x-auto">
						<table class="w-full text-left">
							<thead class="bg-stone-50 text-xs uppercase tracking-wide text-stone-500">
								<tr>
									<th class="px-4 py-3 font-medium">Submitted</th>
									<th class="px-4 py-3 font-medium">Name</th>
									<th class="px-4 py-3 font-medium">Phone</th>
									<th class="px-4 py-3 font-medium">Email</th>
									<th class="px-4 py-3 font-medium">Visit</th>
									<th class="px-4 py-3 font-medium">Source</th>
								</tr>
							</thead>
							<tbody id="appointmentsBody"></tbody>
						</table>
					</div>
				</div>

				<div id="panelConsultations" class="hidden space-y-4">
					<div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-4 sm:p-5 space-y-4">
						<div class="flex flex-col sm:flex-row sm:items-center gap-3">
							<div class="relative flex-1 min-w-0">
								<span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-sm">⌕</span>
								<input
									id="consultSearch"
									type="search"
									placeholder="Search by name or phone…"
									autocomplete="off"
									class="w-full rounded-xl border border-stone-200 pl-9 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-400" />
							</div>
							<p id="consultCount" class="text-sm text-stone-500 whitespace-nowrap sm:shrink-0"></p>
						</div>
						<div class="flex flex-wrap items-center justify-between gap-3">
							<div class="flex flex-wrap gap-2" id="consultFilters">
								<button type="button" data-kind="all" class="filter-btn active px-4 py-1.5 rounded-full border border-stone-300 text-sm">All</button>
								<button type="button" data-kind="facial" class="filter-btn px-4 py-1.5 rounded-full border border-stone-300 text-sm">Facial</button>
								<button type="button" data-kind="head_spa" class="filter-btn px-4 py-1.5 rounded-full border border-stone-300 text-sm">Head spa</button>
							</div>
							<button
								id="consultAddBtn"
								type="button"
								class="px-4 py-2 rounded-full bg-stone-900 text-white text-sm font-medium hover:bg-stone-700">
								+ Add consultation
							</button>
						</div>
					</div>
					<div id="consultationsList" class="space-y-4"></div>
				</div>
			</section>
		</main>

		<div id="consultModal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6">
			<div class="consult-modal-backdrop absolute inset-0 bg-stone-900/50"></div>
			<div class="relative bg-white w-full sm:max-w-lg max-h-[92vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl shadow-xl border border-stone-200">
				<div class="sticky top-0 bg-white border-b border-stone-100 px-5 py-4 flex items-center justify-between">
					<h3 id="consultModalTitle" class="text-lg font-serif">Consultation</h3>
					<button type="button" id="consultModalClose" class="text-stone-400 hover:text-stone-800 text-2xl leading-none">&times;</button>
				</div>
				<form id="consultForm" class="p-5 space-y-4">
					<input type="hidden" id="consultFormId" />
					<div>
						<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Type</label>
						<select id="consultFormKind" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm">
							<option value="facial">Facial consultation</option>
							<option value="head_spa">Head spa & skin care</option>
						</select>
					</div>
					<div>
						<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Full name *</label>
						<input id="consultFormName" required class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm" />
					</div>
					<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
						<div>
							<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Phone</label>
							<input id="consultFormPhone" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm" />
						</div>
						<div>
							<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Email</label>
							<input id="consultFormEmail" type="email" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm" />
						</div>
					</div>
					<div>
						<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Service date</label>
						<input id="consultFormServiceDate" type="date" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm" />
					</div>
					<div>
						<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Services (comma-separated)</label>
						<textarea id="consultFormServices" rows="2" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm"></textarea>
					</div>
					<div id="consultFormAddonsWrap">
						<label class="block text-xs font-medium uppercase tracking-wide text-stone-500 mb-1">Add-ons (comma-separated)</label>
						<textarea id="consultFormAddons" rows="2" class="w-full rounded-xl border border-stone-200 px-3 py-2.5 text-sm"></textarea>
					</div>
					<p id="consultFormError" class="hidden text-sm text-red-600"></p>
					<div class="flex gap-3 pt-2">
						<button type="submit" id="consultFormSave" class="flex-1 bg-stone-900 text-white rounded-full py-3 text-sm font-medium hover:bg-stone-700">Save</button>
						<button type="button" id="consultFormCancel" class="px-5 py-3 rounded-full border border-stone-300 text-sm hover:bg-stone-50">Cancel</button>
					</div>
				</form>
			</div>
		</div>

		<script src="admin.js"></script>
		<script type="module" src="/vercel-analytics.js"></script>
		<script type="module" src="/vercel-speed-insights.js"></script>
	</body>
</html>
