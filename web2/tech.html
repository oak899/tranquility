<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>Technician | Tranquility Hydrotherapy</title>
		<meta name="robots" content="noindex, nofollow" />
		<script src="https://cdn.tailwindcss.com"></script>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap"
			rel="stylesheet" />
		<style>
			body {
				font-family: 'Inter', system-ui, sans-serif;
			}
			h1 {
				font-family: 'Playfair Display', Georgia, serif;
			}
			.client-card {
				transition: transform 0.15s ease, box-shadow 0.15s ease;
			}
			.client-card:active {
				transform: scale(0.99);
			}
			.chip {
				display: inline-block;
				padding: 0.25rem 0.6rem;
				margin: 0.15rem 0.3rem 0.15rem 0;
				border-radius: 9999px;
				background: #f5f5f4;
				font-size: 0.75rem;
				color: #44403c;
			}
			.kind-facial {
				background: #fef3c7;
				color: #92400e;
			}
			.kind-head_spa {
				background: #e7e5e4;
				color: #1c1917;
			}
			.alert-chip {
				background: #fef2f2;
				color: #991b1b;
				border: 1px solid #fecaca;
			}
			.filter-btn.active {
				background: #1c1917;
				color: #fff;
				border-color: #1c1917;
			}
		</style>
	</head>
	<body class="bg-stone-100 text-stone-900 min-h-screen antialiased pb-safe">
		<header class="sticky top-0 z-40 bg-stone-900 text-white shadow-md">
			<div class="max-w-lg mx-auto px-4 py-4">
				<div class="flex items-center justify-between gap-3">
					<div>
						<p class="text-[10px] tracking-[0.25em] uppercase text-stone-400">Today’s clients</p>
						<h1 class="text-xl font-serif">Technician</h1>
					</div>
					<div class="flex items-center gap-3 text-sm">
						<a href="admin.html" class="text-stone-300 hover:text-white">Admin</a>
						<button id="logoutBtn" type="button" class="text-stone-300 hover:text-white hidden">Log out</button>
					</div>
				</div>
			</div>
		</header>

		<main class="max-w-lg mx-auto px-4 py-5">
			<section id="loginView">
				<div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6">
					<h2 class="text-lg font-serif mb-1">Sign in</h2>
					<p class="text-sm text-stone-500 mb-5">Client contact info only — no full consultation forms.</p>
					<form id="loginForm" class="space-y-4">
						<div>
							<label for="username" class="block text-sm font-medium text-stone-700 mb-1">Username</label>
							<input
								id="username"
								name="username"
								required
								class="w-full rounded-xl border border-stone-200 px-4 py-3 text-base" />
						</div>
						<div>
							<label for="password" class="block text-sm font-medium text-stone-700 mb-1">Password</label>
							<input
								id="password"
								name="password"
								type="password"
								required
								class="w-full rounded-xl border border-stone-200 px-4 py-3 text-base" />
						</div>
						<p id="loginError" class="hidden text-sm text-red-600"></p>
						<button
							type="submit"
							class="w-full bg-stone-900 text-white rounded-full py-3.5 text-base font-semibold">
							View clients
						</button>
					</form>
				</div>
			</section>

			<section id="dashboardView" class="hidden space-y-4">
				<div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-4 space-y-3">
					<div class="relative">
						<span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">⌕</span>
						<input
							id="clientSearch"
							type="search"
							placeholder="Search name or phone"
							class="w-full rounded-xl border border-stone-200 pl-9 pr-4 py-3 text-base" />
					</div>
					<div class="flex flex-wrap gap-2" id="kindFilters">
						<button type="button" data-kind="all" class="filter-btn active px-3 py-1.5 rounded-full border border-stone-300 text-sm">All</button>
						<button type="button" data-kind="facial" class="filter-btn px-3 py-1.5 rounded-full border border-stone-300 text-sm">Facial</button>
						<button type="button" data-kind="head_spa" class="filter-btn px-3 py-1.5 rounded-full border border-stone-300 text-sm">Head spa</button>
					</div>
					<div class="flex items-center justify-between text-sm text-stone-500">
						<span id="clientCount"></span>
						<button id="refreshBtn" type="button" class="text-stone-700 font-medium hover:text-stone-900">Refresh</button>
					</div>
				</div>

				<p id="loadError" class="hidden text-sm text-red-600 text-center"></p>
				<div id="clientsList" class="space-y-3"></div>
			</section>
		</main>

		<script src="tech.js"></script>
		<script type="module" src="/vercel-analytics.js"></script>
		<script type="module" src="/vercel-speed-insights.js"></script>
	</body>
</html>
